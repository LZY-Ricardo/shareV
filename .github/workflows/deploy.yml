name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/shareV
            git fetch origin
            git reset --hard origin/main
            docker compose up -d --build
            sleep 5
            curl -sf http://localhost:3000/api/health || (echo "Health check failed!" && exit 1)
            docker compose logs --tail 3
